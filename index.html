        </div>
        <div style={{fontSize:11,color:"var(--sub)",marginTop:10,lineHeight:1.5}}>
          로그인 상태에서는 변경사항이 자동으로 저장됩니다. `지금 바로 저장`은 기다리지 않고 즉시 올리고 싶을 때만 누르면 됩니다.
        </div>
        <div style={{fontSize:11,color:"var(--sub)",marginTop:6,lineHeight:1.5}}>
          Supabase 대시보드의 Authentication 설정에서 Site URL과 Redirect URL에 이 앱 주소를 등록해야 매직링크 로그인이 정상적으로 돌아옵니다.
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10,marginBottom:14}}>
        <Card style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:24}}>⬇</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>백업 내보내기</div>
            <div style={{fontSize:12,color:"var(--sub)",lineHeight:1.5}}>진도, 오답노트, 즐겨찾기, 내 단어를 JSON 파일로 저장해요.</div>
          </div>
          <Btn variant="primary" onClick={exportData} style={{width:"100%",marginTop:"auto"}}>JSON 내보내기</Btn>
        </Card>
        <Card style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:24}}>⬆</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>백업 불러오기</div>
            <div style={{fontSize:12,color:"var(--sub)",lineHeight:1.5}}>다른 기기에서 만든 JSON 파일을 선택하면 현재 기기에 복원돼요.</div>
          </div>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={e=>importFile(e.target.files?.[0])}/>
          <Btn variant="success" onClick={()=>fileRef.current?.click()} style={{width:"100%",marginTop:"auto"}}>JSON 불러오기</Btn>
        </Card>
      </div>

      {status && (
        <div style={{marginBottom:14,padding:"11px 13px",borderRadius:12,background:"var(--accent-dim)",color:"var(--accent)",fontSize:13,fontWeight:700}}>
          {status}
        </div>
      )}

      <Card>
        <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>저장 데이터 구조</div>
        <div style={{fontSize:12,color:"var(--sub)",lineHeight:1.65,marginBottom:12}}>
          나중에 Supabase로 옮길 때 아래 묶음을 테이블로 분리하면 됩니다. 현재는 모두 localStorage와 백업 JSON에 보관돼요.
        </div>
        <pre style={{
          whiteSpace:"pre-wrap",background:"var(--surface)",border:"1px solid var(--border)",
          borderRadius:12,padding:14,fontSize:12,lineHeight:1.5,color:"var(--text)",overflowX:"auto",
        }}>{JSON.stringify(sample, null, 2)}</pre>
      </Card>

      <Card style={{marginTop:14}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>Supabase SQL</div>
        <div style={{fontSize:12,color:"var(--sub)",lineHeight:1.65,marginBottom:12}}>
          SQL Editor에 아래를 한 번 실행하면 개인용 스냅샷 동기화 테이블과 RLS가 준비됩니다.
        </div>
        <pre style={{
          whiteSpace:"pre-wrap",background:"var(--surface)",border:"1px solid var(--border)",
          borderRadius:12,padding:14,fontSize:12,lineHeight:1.5,color:"var(--text)",overflowX:"auto",
        }}>{sqlGuide}</pre>
      </Card>
    </div>
  );
}

Object.assign(window, { BackupScreen });

</script>

<!-- APP -->
<script type="text/babel">

const TWEAK_DEFAULTS = {
  "accent": "periwinkle",
  "zhFont": "serif",
  "density": "comfortable"
};

const ACCENT_OPTIONS = {
  blue:      { accent:"#5B7EE8", bright:"#7B96EE", dim:"rgba(91,126,232,.10)"   },
  indigo:    { accent:"#6B5FD8", bright:"#8B7EE8", dim:"rgba(107,95,216,.10)"   },
  sky:       { accent:"#3A9ED8", bright:"#5AB4E4", dim:"rgba(58,158,216,.10)"   },
  periwinkle:{ accent:"#7B8EE0", bright:"#9BAAE8", dim:"rgba(123,142,224,.10)"  },
};

const NAV = [
  { id:"home",   label:"홈",    icon:"🏠" },
  { id:"study",  label:"학습",  icon:"🎯" },
  { id:"vocab",  label:"단어장", icon:"📖" },
  { id:"phrase", label:"회화",  icon:"💬" },
  { id:"grammar", label:"문법", icon:"🧩" },
  { id:"review", label:"복습",  icon:"🔄" },
  { id:"chat",   label:"AI도움", icon:"🤖" },
  { id:"stats",  label:"통계",  icon:"📊" },
  { id:"backup", label:"동기화", icon:"💾" },
];

function applyAccent(key) {
  const c = ACCENT_OPTIONS[key] || ACCENT_OPTIONS.periwinkle;
  document.documentElement.style.setProperty("--accent", c.accent);
  document.documentElement.style.setProperty("--accent-bright", c.bright);
  document.documentElement.style.setProperty("--accent-dim", c.dim);
}

function App() {
  const bootstrappedUserRef = React.useRef(null);
  const autoSyncTimerRef = React.useRef(null);
  const suppressNextAutoSyncRef = React.useRef(false);
  const [screen, setScreen] = React.useState(() => store.get("screen","home"));
  const [activeChapter, setActiveChapter] = React.useState(null);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(() => ({...TWEAK_DEFAULTS, ...store.get("tweaks", {})}));
  const [stats, setStats] = React.useState(() => hydrateStats(store.get("stats", makeDefaultStats())));
  const [supabaseConfig, setSupabaseConfigState] = React.useState(() => getSupabaseConfig());
  const [supabaseClient, setSupabaseClient] = React.useState(null);
  const [session, setSession] = React.useState(null);
  const [syncStatus, setSyncStatus] = React.useState("로컬 저장 사용 중");
  const [syncState, setSyncState] = React.useState("local");
  const [lastSyncedAt, setLastSyncedAt] = React.useState(null);
  const [lastRemoteUpdatedAt, setLastRemoteUpdatedAt] = React.useState(null);
  const [hasSyncConflict, setHasSyncConflict] = React.useState(false);

  React.useEffect(() => { store.set("screen", screen); }, [screen]);
  React.useEffect(() => { store.set("stats", stats); }, [stats]);
  React.useEffect(() => {
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    }
  }, []);
  React.useEffect(() => { applyAccent(tweaks.accent); }, [tweaks.accent]);
  React.useEffect(() => {
    document.documentElement.style.setProperty(
      "--font-zh", tweaks.zhFont==="sans" ? "'Noto Sans SC',sans-serif" : "'Noto Serif SC',serif"
    );
  }, [tweaks.zhFont]);
  React.useEffect(() => {
    const client = createSupabaseBrowserClient(supabaseConfig);
    setSupabaseClient(client);
    if (!client) {
      setSession(null);
      bootstrappedUserRef.current = null;
      setSyncStatus("로컬 저장 사용 중");
      setSyncState("local");
      setLastSyncedAt(null);
      setLastRemoteUpdatedAt(null);
      setHasSyncConflict(false);
      return;
    }
    let unsub = null;
    client.auth.getSession().then(({ data }) => {
      setSession(data.session || null);
      setSyncStatus(data.session ? `로그인됨: ${data.session.user?.email || "사용자"}` : "Supabase 설정 완료");
      setSyncState(data.session ? "synced" : "ready");
      if (!data.session) setHasSyncConflict(false);
    });
    const { data } = client.auth.onAuthStateChange((_event, nextSession) => {
      setSession(nextSession || null);
      setSyncStatus(nextSession ? `로그인됨: ${nextSession.user?.email || "사용자"}` : "로그아웃됨");
      setSyncState(nextSession ? "synced" : "ready");
      if (!nextSession) {
        setHasSyncConflict(false);
        setLastSyncedAt(null);
        setLastRemoteUpdatedAt(null);
      }
    });
    unsub = data?.subscription;
    return () => unsub?.unsubscribe?.();
  }, [supabaseConfig.url, supabaseConfig.anonKey]);
  React.useEffect(() => {
    if (!supabaseClient || !session?.user?.id) return;
    if (bootstrappedUserRef.current === session.user.id) return;
    bootstrappedUserRef.current = session.user.id;
    (async () => {
      const { data } = await pullCloudSnapshot(supabaseClient, session.user.id);
      const remoteState = data?.data?.studyState;
      const remoteTweaks = data?.data?.tweaks;
      setLastRemoteUpdatedAt(data?.updated_at || null);
      if (!remoteState) {
        const pushed = await pushCloudSnapshot(supabaseClient, session.user.id, stats, tweaks);
        setSyncStatus("클라우드 초기 저장 완료");
        setSyncState("synced");
        setLastSyncedAt(pushed.data?.updated_at || new Date().toISOString());
        setLastRemoteUpdatedAt(pushed.data?.updated_at || new Date().toISOString());
        return;
      }
      const localStamp = String(stats.lastStudiedAt || "");
      const remoteStamp = String(remoteState.lastStudiedAt || data.updated_at || "");
      if (remoteStamp > localStamp) {
        setStats(hydrateStats(remoteState));
        suppressNextAutoSyncRef.current = true;
        if (remoteTweaks) setTweaks({...TWEAK_DEFAULTS, ...remoteTweaks});
        setSyncStatus("클라우드 최신 데이터를 가져왔어요.");
        setSyncState("synced");
        setLastSyncedAt(data.updated_at || new Date().toISOString());
        setHasSyncConflict(false);
      } else {
        const pushed = await pushCloudSnapshot(supabaseClient, session.user.id, stats, tweaks);
        setSyncStatus("로컬 최신 데이터를 클라우드에 반영했어요.");
        setSyncState("synced");
        setLastSyncedAt(pushed.data?.updated_at || new Date().toISOString());
        setLastRemoteUpdatedAt(pushed.data?.updated_at || new Date().toISOString());
        setHasSyncConflict(false);
      }
    })();
  }, [supabaseClient, session?.user?.id]);

  const applyTweak = (key, val) => {
    const next = {...tweaks, [key]:val};
    setTweaks(next);
    store.set("tweaks", next);
  };

  const handleStudyChapter = (ch) => {
    setActiveChapter(ch);
    setScreen("study");
  };

  const handleResult = (ok, word, chapterId, earned=10) => {
    setStats(s => recordAnswer(s, ok, word, chapterId, earned));
  };

  const handleToggleWordFavorite = (word) => {
    setStats(s => {
      const favorites = { words:{...((s.favorites||{}).words||{})}, phrases:{...((s.favorites||{}).phrases||{})} };
      const key = wordKey(word);
      if (favorites.words[key]) delete favorites.words[key];
      else favorites.words[key] = { char:word.char, chapterId:word.chapterId, savedAt:new Date().toISOString() };
      return { ...s, favorites };
    });
  };

  const handleTogglePhraseFavorite = (set, phrase) => {
    setStats(s => {
      const favorites = { words:{...((s.favorites||{}).words||{})}, phrases:{...((s.favorites||{}).phrases||{})} };
      const key = `${set.id}:${phrase.char}`;
      if (favorites.phrases[key]) delete favorites.phrases[key];
      else favorites.phrases[key] = { setId:set.id, char:phrase.char, meaning:phrase.meaning, savedAt:new Date().toISOString() };
      return { ...s, favorites };
    });
  };

  const handleAddUserWord = (word) => {
    setStats(s => ({ ...s, userWords:[...(s.userWords || []), word] }));
  };

  const handleImport = (nextStats, nextTweaks) => {
    setStats(hydrateStats(nextStats));
    if (nextTweaks) setTweaks({...TWEAK_DEFAULTS, ...nextTweaks});
    setScreen("home");
  };
  const saveSupabaseRuntimeConfig = (config) => {
    setSupabaseConfig(config);
    setSupabaseConfigState(config);
    setSyncStatus(config.url && config.anonKey ? "Supabase 설정 저장됨" : "로컬 저장 사용 중");
  };
  const guardedCloudPush = async (modeLabel="저장") => {
    if (!supabaseClient || !session?.user?.id) {
      setSyncStatus("로그인 후 클라우드 저장을 사용할 수 있어요.");
      setSyncState("error");
      return { ok:false };
    }
    const remote = await pullCloudSnapshot(supabaseClient, session.user.id);
    const remoteUpdatedAt = remote.data?.updated_at || null;
    if (remoteUpdatedAt) setLastRemoteUpdatedAt(remoteUpdatedAt);
    if (remoteUpdatedAt && lastSyncedAt && remoteUpdatedAt > lastSyncedAt) {
      setHasSyncConflict(true);
      setSyncStatus("다른 기기에서 더 최근 저장이 있어요. 먼저 클라우드에서 불러오기를 눌러 주세요.");
      setSyncState("error");
      return { ok:false, conflict:true };
    }
    const pushed = await pushCloudSnapshot(supabaseClient, session.user.id, stats, tweaks);
    if (pushed.error) {
      setSyncStatus(`${modeLabel} 실패: ${pushed.error.message}`);
      setSyncState("error");
      return { ok:false };
    }
    const stamp = pushed.data?.updated_at || new Date().toISOString();
    setLastSyncedAt(stamp);
    setLastRemoteUpdatedAt(stamp);
    setHasSyncConflict(false);
    setSyncStatus(`${modeLabel} 완료`);
    setSyncState("synced");
    return { ok:true };
  };
  const sendMagicLink = async (email) => {
    if (!supabaseClient) {
      setSyncStatus("먼저 Supabase URL과 anon key를 저장해 주세요.");
      setSyncState("error");
      return;
    }
    if (!String(email || "").trim()) {
      setSyncStatus("로그인할 이메일을 입력해 주세요.");
      setSyncState("error");
      return;
    }
    const { error } = await supabaseClient.auth.signInWithOtp({
      email: email.trim(),
      options: { emailRedirectTo: window.location.href }
    });
    setSyncStatus(error ? `로그인 메일 전송 실패: ${error.message}` : "매직링크를 이메일로 보냈어요.");
    setSyncState(error ? "error" : "ready");
  };
  const pushNow = async () => {
    if (!supabaseClient || !session?.user?.id) {
      setSyncStatus("로그인 후 클라우드 저장을 사용할 수 있어요.");
      setSyncState("error");
      return;
    }
    setSyncStatus("클라우드 저장 중...");
    setSyncState("syncing");
    await guardedCloudPush("수동 저장");
  };
  const pullNow = async () => {
    if (!supabaseClient || !session?.user?.id) {
      setSyncStatus("로그인 후 클라우드 불러오기를 사용할 수 있어요.");
      setSyncState("error");
      return;
    }
    setSyncStatus("클라우드 데이터 확인 중...");
    setSyncState("syncing");
    const { data, error } = await pullCloudSnapshot(supabaseClient, session.user.id);
    if (error) {
      setSyncStatus(`클라우드 불러오기 실패: ${error.message}`);
      setSyncState("error");
      return;
    }
    if (!data?.data?.studyState) {
      setSyncStatus("클라우드에 저장된 데이터가 없어요. 현재 로컬 데이터를 기준으로 시작합니다.");
      setSyncState("ready");
      setHasSyncConflict(false);
      return;
    }
    setStats(hydrateStats(data.data.studyState));
    suppressNextAutoSyncRef.current = true;
    if (data.data.tweaks) setTweaks({...TWEAK_DEFAULTS, ...data.data.tweaks});
    setSyncStatus("클라우드 데이터 불러오기 완료");
    setSyncState("synced");
    setLastSyncedAt(data.updated_at || new Date().toISOString());
    setLastRemoteUpdatedAt(data.updated_at || new Date().toISOString());
    setHasSyncConflict(false);
  };
  const signOutCloud = async () => {
    if (!supabaseClient) return;
    await supabaseClient.auth.signOut();
    setSession(null);
    bootstrappedUserRef.current = null;
    setSyncStatus("로그아웃됨");
    setSyncState("ready");
    setLastSyncedAt(null);
    setLastRemoteUpdatedAt(null);
    setHasSyncConflict(false);
  };
  React.useEffect(() => {
    if (!supabaseClient || !session?.user?.id) return;
    if (suppressNextAutoSyncRef.current) {
      suppressNextAutoSyncRef.current = false;
      return;
    }
    setSyncStatus("변경사항 감지됨 - 자동 저장 대기 중");
    setSyncState("dirty");
    if (autoSyncTimerRef.current) clearTimeout(autoSyncTimerRef.current);
    autoSyncTimerRef.current = setTimeout(async () => {
      setSyncStatus("자동 동기화 중...");
      setSyncState("syncing");
      await guardedCloudPush("자동 동기화");
    }, 900);
    return () => {
      if (autoSyncTimerRef.current) clearTimeout(autoSyncTimerRef.current);
    };
  }, [stats, tweaks, session?.user?.id, supabaseClient]);

  const reviewCount = getDueReviewWords(stats).length;

  // Mobile nav keeps sync reachable on phones; stats moves to the sidebar-first path.
  const MOBILE_NAV = NAV.filter(n => !["chat","stats"].includes(n.id));

  return (
    <div className="app">
      {/* Sidebar */}
      <nav className="sidebar">
        <div className="logo">
          <div className="logo-badge">学</div>
          <div style={{marginLeft:8}}>
            <div className="logo-name">中文학습</div>
            <div className="logo-sub">매일 조금씩</div>
          </div>
        </div>
        {NAV.map(n => (
          <div key={n.id} className={`nav-item${screen===n.id?" active":""}`}
            onClick={()=>setScreen(n.id)}>
            <span className="icon">{n.icon}</span>
            <span>{n.label}</span>
            {n.id==="review" && reviewCount>0 &&
              <span className="nav-badge">{reviewCount}</span>}
          </div>
        ))}
        <div style={{marginTop:"auto", paddingTop:16, borderTop:"1px solid var(--border)"}}>
          <div className="nav-item" onClick={()=>setTweaksOpen(o=>!o)}>
            <span className="icon">⚙️</span>
            <span style={{fontSize:12}}>테마 설정</span>
          </div>
        </div>
      </nav>

      {/* Main content */}
      <main className="main" key={screen}>
        {screen==="home"   && (
          <HomeScreen
            stats={stats}
            onStudyChapter={handleStudyChapter}
            onReview={()=>setScreen("review")}
            onAiAssist={()=>setScreen("chat")}
            onCloudSync={()=>setScreen("backup")}
            session={session}
            syncStatus={syncStatus}
            syncState={syncState}
          />
        )}
        {screen==="study"  && <StudyScreen chapter={activeChapter||getStudyChapters(stats)[0]} stats={stats} onResult={handleResult} onBack={()=>setScreen("home")}/>}
        {screen==="vocab"  && <VocabScreen stats={stats} onStudyChapter={handleStudyChapter} onToggleWordFavorite={handleToggleWordFavorite} onAddUserWord={handleAddUserWord}/>}
        {screen==="phrase" && <PhraseScreen stats={stats} onTogglePhraseFavorite={handleTogglePhraseFavorite}/>}
        {screen==="grammar" && <GrammarScreen/>}
        {screen==="review" && <ReviewScreen stats={stats} onResult={handleResult} onBack={()=>setScreen("home")}/>}
        {screen==="chat"   && <ChatScreen/>}
        {screen==="stats"  && <StatsScreen stats={stats}/>}
        {screen==="backup" && (
          <BackupScreen
            stats={stats}
            tweaks={tweaks}
            onImport={handleImport}
            supabaseConfig={supabaseConfig}
            session={session}
            syncStatus={syncStatus}
            syncState={syncState}
            lastSyncedAt={lastSyncedAt}
            lastRemoteUpdatedAt={lastRemoteUpdatedAt}
            hasSyncConflict={hasSyncConflict}
            onSaveSupabaseConfig={saveSupabaseRuntimeConfig}
            onSendMagicLink={sendMagicLink}
            onSignOut={signOutCloud}
            onPullCloud={pullNow}
            onPushCloud={pushNow}
          />
        )}
      </main>

      {/* Bottom nav (mobile) */}
      <nav className="bnav">
        <div className="bnav-inner">
          {MOBILE_NAV.map(n => (
            <div key={n.id} className={`bnav-item${screen===n.id?" active":""}`}
              onClick={()=>setScreen(n.id)}>
              <span className="icon">{n.icon}</span>
              <span>{n.label}</span>
              {n.id==="review" && reviewCount>0 &&
                <span className="bnav-badge">{reviewCount}</span>}
            </div>
          ))}
        </div>
      </nav>

      {/* Tweaks panel */}
      <div className={`tweaks${tweaksOpen?" open":""}`}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="tw-title" style={{margin:0}}>테마 설정</div>
          <button onClick={()=>setTweaksOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"var(--sub)"}}>✕</button>
        </div>

        <div className="tw-label">포인트 색상</div>
        <div className="tw-row">
          {[["blue","코발트"],["indigo","인디고"],["sky","스카이"],["periwinkle","페리윙클"]].map(([k,l])=>(
            <button key={k} className={`tw-chip${tweaks.accent===k?" on":""}`}
              onClick={()=>applyTweak("accent",k)}>{l}</button>
          ))}
        </div>

        <div className="tw-label">한자 폰트</div>
        <div className="tw-row">
          {[["serif","명조체"],["sans","고딕체"]].map(([k,l])=>(
            <button key={k} className={`tw-chip${tweaks.zhFont===k?" on":""}`}
              onClick={()=>applyTweak("zhFont",k)}>{l}</button>
          ))}
        </div>

        <div className="tw-label">학습 데이터 초기화</div>
        <div className="tw-row">
          <button className="tw-chip" style={{color:"var(--coral)",borderColor:"var(--coral)55"}}
            onClick={()=>{
              if(!confirm("정말 초기화할까요?")) return;
              const fresh = makeDefaultStats();
              setStats(fresh); store.set("stats",fresh);
              setTweaksOpen(false);
            }}>데이터 초기화</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
