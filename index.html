:root {
  --bg:          #F2F5FC;
  --surface:     #E8EDF9;
  --card:        #FFFFFF;
  --card2:       #EDF0FA;
  --border:      #D8DFF2;
  --accent:      #5B7EE8;
  --accent-bright:#7B96EE;
  --accent-dim:  rgba(91,126,232,.10);
  --gold:        #E09040;
  --gold-dim:    rgba(224,144,64,.12);
  --coral:       #D9604A;
  --coral-dim:   rgba(217,96,74,.11);
  --text:        #1E2348;
  --sub:         #6B7AAC;
  --sub2:        #A4AECE;
  --font-ui:     'DM Sans', sans-serif;
  --font-zh:     'Noto Serif SC', serif;
  --font-zh-sans:'Noto Sans SC', sans-serif;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-ui); -webkit-font-smoothing:antialiased; }
#root { height:100%; }
button { font-family:var(--font-ui); }
input  { font-family:var(--font-ui); }
textarea { font-family:var(--font-ui); }
button, input, textarea { -webkit-tap-highlight-color:transparent; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::selection { background:var(--accent-dim); }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,100%{opacity:.3} 50%{opacity:1} }

.app {
  display:flex; height:100dvh; min-height:100vh; overflow:hidden;
}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar {
  width:210px; flex-shrink:0;
  background:var(--card);
  border-right:1px solid var(--border);
  box-shadow:2px 0 16px rgba(91,126,232,.06);
  display:flex; flex-direction:column;
  padding:24px 12px 20px;
}
.logo {
  display:flex; align-items:center; gap:10px;
  padding:0 8px 22px; border-bottom:1px solid var(--border); margin-bottom:10px;
}
.logo-badge {
  width:36px; height:36px; border-radius:10px;
  background:var(--accent); display:grid; place-items:center;
  font-family:var(--font-zh); color:#0F1512; font-size:18px; font-weight:700;
}
.logo-name  { font-size:14px; font-weight:700; line-height:1.2; color:var(--text); }
.logo-sub   { font-size:11px; color:var(--sub); }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px; margin-bottom:2px;
  font-size:13px; font-weight:500; color:var(--sub);
  cursor:pointer; transition:all .15s; user-select:none;
}
.nav-item:hover  { background:var(--card); color:var(--text); }
.nav-item.active { background:var(--accent-dim); color:var(--accent); font-weight:600; }
.nav-item .icon  { font-size:17px; width:22px; text-align:center; flex-shrink:0; }
.nav-badge {
  margin-left:auto; font-size:10px; font-weight:700;
  background:var(--coral); color:white;
  padding:2px 6px; border-radius:99px;
}

/* ── MAIN ─────────────────────────────────── */
.main {
  flex:1; overflow-y:auto;
  padding:28px 22px 100px;
  max-width:760px;
  width:100%;
  min-width:0;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
@media(min-width:900px){
  .main { padding:36px 40px 60px; }
}

/* ── BOTTOM NAV ───────────────────────────── */
.bnav {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-top:1px solid var(--border);
  padding:8px 0 max(10px, env(safe-area-inset-bottom));
  z-index:100;
}
.bnav-inner { display:flex; justify-content:space-around; max-width:680px; margin:0 auto; }
.bnav-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  min-width:54px; min-height:50px; justify-content:center;
  padding:4px 8px; cursor:pointer; color:var(--sub);
  font-size:10px; font-weight:600; transition:color .15s;
  position:relative;
}
.bnav-item .icon { font-size:20px; }
.bnav-item.active { color:var(--accent); }
.bnav-badge {
  position:absolute; top:0; right:4px;
  background:var(--coral); color:white;
  font-size:9px; font-weight:700; width:14px; height:14px;
  border-radius:99px; display:grid; place-items:center;
}

@media(max-width:680px){
  .sidebar { display:none; }
  .bnav    { display:block; }
  .main    { padding:20px 16px calc(94px + env(safe-area-inset-bottom)); max-width:none; }
}
@media(max-width:430px){
  .bnav-item { min-width:48px; font-size:9px; }
  .bnav-item .icon { font-size:18px; }
}

/* ── TWEAKS ───────────────────────────────── */
.tweaks {
  position:fixed; bottom:90px; right:16px;
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:18px 16px;
  width:220px; z-index:200;
  box-shadow:0 12px 40px rgba(0,0,0,.4);
  display:none;
}
.tweaks.open { display:block; animation:fadeUp .2s ease; }
@media(min-width:681px){ .tweaks { bottom:20px; right:20px; } }
.tw-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:14px; }
.tw-label { font-size:10px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.06em; margin-bottom:7px; }
.tw-row   { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.tw-chip  {
  padding:4px 10px; border-radius:99px; font-size:12px; font-weight:500;
  border:1.5px solid var(--border); cursor:pointer; transition:all .12s;
  color:var(--sub); background:transparent; font-family:var(--font-ui);
}
.tw-chip.on { background:var(--accent); border-color:var(--accent); color:#0F1512; }

const BUILT_IN_CHAPTERS = [...HSK_CHAPTERS, ...THEME_CHAPTERS];

function normalizeWord(word, chapter) {
  return {
    tones: [],
    tags: [],
    difficulty: chapter.level || 1,
    frequency: 3,
    source: "built-in",
    ...word,
    chapterId: word.chapterId || chapter.id,
    level: word.level || chapter.level || 1,
    chapterTitle: chapter.title,
    chapterEmoji: chapter.emoji,
  };
}

function makeUserChapter(userWords=[]) {
  return {
    id:"user-words", level:0, num:999, title:"내가 추가한 단어", titleZh:"我的词语", emoji:"⭐",
    words:userWords.map((w, i) => ({
      id:w.id || `user-${i}`,
      char:w.char || "",
      pinyin:w.pinyin || "",
      tones:Array.isArray(w.tones) ? w.tones : [],
      meaning:w.meaning || "",
      tags:Array.isArray(w.tags) ? w.tags : ["사용자"],
      example:w.example || "",
      exPinyin:w.exPinyin || "",
      exMeaning:w.exMeaning || "",
      difficulty:Number(w.difficulty || 1),
      frequency:Number(w.frequency || 3),
      source:"user",
    }))
  };
}

function getStudyChapters(stats={}) {
  const userWords = stats.userWords || [];
  const chapters = userWords.length ? [...BUILT_IN_CHAPTERS, makeUserChapter(userWords)] : BUILT_IN_CHAPTERS;
  return chapters.map(ch => ({ ...ch, words: ch.words.map(w => normalizeWord(w, ch)) }));
}

function getAllWords(stats={}) {
  return getStudyChapters(stats).flatMap(ch => ch.words);
}

const HSK_LEVELS = [...new Set(BUILT_IN_CHAPTERS.map(ch => ch.level))].sort((a,b)=>a-b);
const ALL_WORDS = getAllWords();

const StorageService = {
  legacy: { screen:"screen", stats:"stats2", tweaks:"tweaks" },
  get(key, def) {
    try {
      const v = localStorage.getItem(key);
      return v !== null ? JSON.parse(v) : def;
    } catch {
      return def;
    }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch {}
  },
  migrate() {
    const legacyStats = this.get(this.legacy.stats, null);
    if (legacyStats && !localStorage.getItem(STORE_KEYS.stats)) this.set(STORE_KEYS.stats, legacyStats);
    const legacyScreen = this.get(this.legacy.screen, null);
    if (legacyScreen && !localStorage.getItem(STORE_KEYS.screen)) this.set(STORE_KEYS.screen, legacyScreen);
    const legacyTweaks = this.get(this.legacy.tweaks, null);
    if (legacyTweaks && !localStorage.getItem(STORE_KEYS.tweaks)) this.set(STORE_KEYS.tweaks, legacyTweaks);
  },
  exportPayload(studyState, tweaks) {
    return {
      app:"zh-daily-study",
      schemaVersion:APP_SCHEMA_VERSION,
      exportedAt:new Date().toISOString(),
      studyState,
      tweaks,
    };
  }
};

StorageService.migrate();

// Backward-compatible store wrapper: old keys are mapped into the v3 namespace.
const store = {
  get: (k, def) => StorageService.get(STORE_KEYS[k] || k, def),
  set: (k, v) => StorageService.set(STORE_KEYS[k] || k, v),
  remove: (k) => StorageService.remove(STORE_KEYS[k] || k),
};

const todayKey = () => new Date().toISOString().slice(0,10);
const dateKeyAfter = (days) => {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
};
const wordKey = (word, chapterId=word.chapterId) => `${chapterId}:${word.char}`;
const formatDateTime = (iso) => {
  if (!iso) return "아직 없음";
  try {
    return new Date(iso).toLocaleString("ko-KR", {
      month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"
    });
  } catch {
    return iso;
  }
};

function makeDefaultStats() {
  return {
    streak:0, totalLearned:0, totalCorrect:0, totalAnswered:0,
    sessions:0, studyDays:[], todayCount:0, chapterProgress:{},
    reviewQueue:[], reviewLedger:{}, learnedKeys:{}, favorites:{words:{}, phrases:{}},
    bookmarks:{words:{}, phrases:{}}, userWords:[], totalXP:0, maxCombo:0,
    lastStudiedAt:null,
  };
}

function hydrateStats(raw={}) {
  const stats = { ...makeDefaultStats(), ...raw };
  const lastDay = stats.lastStudiedAt ? String(stats.lastStudiedAt).slice(0,10) : null;
  if (lastDay !== todayKey()) stats.todayCount = 0;
  stats.favorites = {
    words:{...((stats.favorites || {}).words || {})},
    phrases:{...((stats.favorites || {}).phrases || {})},
  };
  stats.bookmarks = {
    words:{...((stats.bookmarks || {}).words || {})},
    phrases:{...((stats.bookmarks || {}).phrases || {})},
  };
  return stats;
}

function getSupabaseConfig() {
  return {
    ...SUPABASE_DEFAULT_CONFIG,
    ...StorageService.get(SUPABASE_CONFIG_KEY, {}),
  };
}

function setSupabaseConfig(config) {
  const rawUrl = String(config.url || "").trim();
  const normalizedUrl = rawUrl
    .replace(/\/rest\/v1\/?$/i, "")
    .replace(/\/+$/,"");
  StorageService.set(SUPABASE_CONFIG_KEY, {
    url:normalizedUrl,
    anonKey:String(config.anonKey || "").trim(),
  });
}

function createSupabaseBrowserClient(config) {
  if (!config?.url || !config?.anonKey || !window.supabase?.createClient) return null;
  try {
    return window.supabase.createClient(config.url, config.anonKey, {
      auth: {
        persistSession:true,
        autoRefreshToken:true,
        detectSessionInUrl:true,
      },
    });
  } catch {
    return null;
  }
}

async function pullCloudSnapshot(client, userId) {
  if (!client || !userId) return { data:null, error:new Error("NO_CLIENT") };
  const { data, error } = await client
    .from("study_snapshots")
    .select("user_id, data, updated_at")
    .eq("user_id", userId)
    .maybeSingle();
  return { data, error };
}

async function pushCloudSnapshot(client, userId, studyState, tweaks) {
  if (!client || !userId) return { error:new Error("NO_CLIENT") };
  const payload = {
    app:"zh-daily-study",
    schemaVersion:APP_SCHEMA_VERSION,
    syncedAt:new Date().toISOString(),
    studyState,
    tweaks,
  };
  return client
    .from("study_snapshots")
    .upsert({ user_id:userId, data:payload, updated_at:new Date().toISOString() }, { onConflict:"user_id" })
    .select("updated_at")
    .single();
}

function getDueReviewKeys(stats={}) {
  const today = todayKey();
  const ledger = stats.reviewLedger || {};
  const fromLedger = Object.entries(ledger)
    .filter(([,item]) => item.due <= today || item.wrongStreak > 0)
    .map(([key]) => key);
  return [...new Set([...(stats.reviewQueue || []), ...fromLedger])];
}

function getDueReviewWords(stats={}) {
  const keys = getDueReviewKeys(stats);
  const byKey = new Map(getAllWords(stats).map(w => [wordKey(w), w]));
  return keys
    .map(key => byKey.get(key))
    .filter(Boolean)
    .sort((a,b) => {
      const la = (stats.reviewLedger || {})[wordKey(a)] || {};
      const lb = (stats.reviewLedger || {})[wordKey(b)] || {};
      return (lb.wrong || 0) - (la.wrong || 0) || String(la.due || "").localeCompare(String(lb.due || ""));
    });
}

function recordAnswer(prevStats, ok, word, chapterId, earned=10) {
  const s = { ...makeDefaultStats(), ...prevStats };
  const today = todayKey();
  const studyDays = s.studyDays.includes(today) ? s.studyDays : [...s.studyDays, today];
  const daySet = new Set(studyDays);
  let streak = 0;
  for (let i=0; i<365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    if (daySet.has(d.toISOString().slice(0,10)) || daySet.has(d.toDateString())) streak++;
    else break;
  }
  const cp = { ...(s.chapterProgress || {}) };
  const learnedKeys = { ...(s.learnedKeys || {}) };
  const key = wordKey(word, chapterId);
  const firstLearn = ok && !learnedKeys[key];
  if (firstLearn) {
    learnedKeys[key] = { firstAt:new Date().toISOString(), chapterId, char:word.char };
    cp[chapterId] = (cp[chapterId] || 0) + 1;
  }

  const reviewLedger = { ...(s.reviewLedger || {}) };
  const old = reviewLedger[key] || { wrong:0, correct:0, interval:0, ease:2.2, wrongStreak:0 };
  const nextInterval = ok ? Math.max(1, Math.round((old.interval || 0) * (old.ease || 2.2)) || 1) : 0;
  reviewLedger[key] = {
    ...old,
    wrong: old.wrong + (ok ? 0 : 1),
    correct: old.correct + (ok ? 1 : 0),
    wrongStreak: ok ? 0 : (old.wrongStreak || 0) + 1,
    interval: nextInterval,
    ease: Math.max(1.3, (old.ease || 2.2) + (ok ? .15 : -.25)),
    lastSeen: today,
    due: ok ? dateKeyAfter(nextInterval) : today,
  };

  const dueKeys = new Set(getDueReviewKeys({ ...s, reviewLedger }));
  if (!ok) dueKeys.add(key);
  if (ok && dueKeys.has(key)) dueKeys.delete(key);

  return {
    ...s,
    totalLearned: Object.keys(learnedKeys).length,
    totalCorrect: (s.totalCorrect || 0) + (ok ? 1 : 0),
    totalAnswered: (s.totalAnswered || 0) + 1,
    totalXP: (s.totalXP || 0) + (ok ? earned : 0),
    todayCount: (s.todayCount || 0) + 1,
    studyDays,
    streak,
    chapterProgress:cp,
    learnedKeys,
    reviewLedger,
    reviewQueue:[...dueKeys],
    sessions:(s.sessions || 0) + ((s.todayCount || 0) === 0 ? 1 : 0),
    lastStudiedAt:new Date().toISOString(),
  };
}

const speak = (text) => {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.82; u.pitch = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
};

Object.assign(window, {
  HSK_CHAPTERS, BUILT_IN_CHAPTERS, THEME_CHAPTERS, ALL_WORDS, HSK_LEVELS,
  APP_SCHEMA_VERSION, STORE_KEYS, StorageService, store, speak,
  getStudyChapters, getAllWords, getDueReviewKeys, getDueReviewWords,
  makeDefaultStats, hydrateStats, recordAnswer, wordKey, todayKey,
  getSupabaseConfig, setSupabaseConfig, createSupabaseBrowserClient,
  pullCloudSnapshot, pushCloudSnapshot, formatDateTime
});

<script type="text/babel">
// Shared UI components — exported to window

const TONE_COLORS = ["","#C8993C","#72B882","#A78BFA","#D9624F","#7B9B8E"];
const TONE_LABELS = ["","¹","²","³","⁴","·"];

function ToneBadge({ tone, size=18 }) {
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", justifyContent:"center",
      width:size, height:size, borderRadius:5, fontSize:size*0.65, fontWeight:700, flexShrink:0,
      background: TONE_COLORS[tone] ? TONE_COLORS[tone]+"22" : "var(--card2)",
      color: TONE_COLORS[tone] || "var(--sub)",
      border: `1px solid ${TONE_COLORS[tone] ? TONE_COLORS[tone]+"44" : "var(--border)"}`,
    }}>{TONE_LABELS[tone]||"·"}</span>
  );
}

function PinyinRow({ tones=[] }) {
  return (
    <div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>
      {tones.map((t,i) => <ToneBadge key={i} tone={t} size={20}/>)}
    </div>
  );
}

function TTSBtn({ text, size="sm" }) {
  const [playing, setPlaying] = React.useState(false);
  const handleClick = (e) => {
    e.stopPropagation();
    setPlaying(true);
    speak(text);
    setTimeout(() => setPlaying(false), 1200);
  };
  const s = size === "lg"
    ? { width:44, height:44, fontSize:20, borderRadius:12 }
    : { width:32, height:32, fontSize:15, borderRadius:8 };
  return (
    <button onClick={handleClick} style={{
      ...s, display:"grid", placeItems:"center",
      background: playing ? "var(--accent-dim)" : "var(--card2)",
      border: `1px solid ${playing ? "var(--accent)44" : "var(--border)"}`,
      color: playing ? "var(--accent)" : "var(--sub)",
      cursor:"pointer", transition:"all .2s", flexShrink:0,
    }}>
      {playing ? "◉" : "▶"}
    </button>
  );
}

function ProgressBar({ value=0, max=100, color="var(--accent)", height=6 }) {
  const pct = Math.min(100, Math.round((value/max)*100));
  return (
    <div style={{height, background:"var(--card2)", borderRadius:99, overflow:"hidden"}}>
      <div style={{height:"100%", width:`${pct}%`, background:color, borderRadius:99, transition:"width .5s ease"}}/>
    </div>
  );
}

function Chip({ label, active, onClick, color }) {
  return (
    <button onClick={onClick} style={{
      padding:"5px 14px", borderRadius:99, fontSize:13, fontWeight:500,
      border:`1.5px solid ${active ? (color||"var(--accent)") : "var(--border)"}`,
      background: active ? (color||"var(--accent)") : "transparent",
      color: active ? "#fff" : "var(--sub)",
      cursor:"pointer", transition:"all .15s", whiteSpace:"nowrap",
      fontFamily:"var(--font-ui)",
    }}>{label}</button>
  );
}

function Btn({ children, onClick, variant="primary", style={}, disabled=false }) {
  const base = {
    display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8,
    borderRadius:13, fontSize:15, fontWeight:600, cursor:disabled?"not-allowed":"pointer",
    border:"none", fontFamily:"var(--font-ui)", transition:"all .15s",
    opacity: disabled ? .5 : 1,
  };
  const variants = {
    primary: { background:"var(--accent)", color:"#0F1512", padding:"13px 28px" },
    ghost:   { background:"var(--card2)", color:"var(--text)", padding:"11px 22px" },
    danger:  { background:"var(--coral-dim)", color:"var(--coral)", padding:"11px 22px", border:"1.5px solid var(--coral)33" },
    success: { background:"var(--accent-dim)", color:"var(--accent)", padding:"11px 22px", border:"1.5px solid var(--accent)44" },
  };
  return (
    <button onClick={disabled ? undefined : onClick}
      style={{...base, ...variants[variant], ...style}}>
      {children}
    </button>
  );
}

function EmptyState({ icon, title, sub }) {
  return (
    <div style={{textAlign:"center", padding:"56px 24px", color:"var(--sub)"}}>
      <div style={{fontSize:48, marginBottom:14}}>{icon}</div>
      <div style={{fontSize:17, fontWeight:600, color:"var(--text)", marginBottom:6}}>{title}</div>
      {sub && <div style={{fontSize:14}}>{sub}</div>}
    </div>
  );
}

function SectionTitle({ children, sub }) {
  return (
    <div style={{marginBottom:16}}>
      <div style={{fontSize:19, fontWeight:700, color:"var(--text)"}}>{children}</div>
      {sub && <div style={{fontSize:13, color:"var(--sub)", marginTop:3}}>{sub}</div>}
    </div>
  );
}

function Card({ children, style={}, onClick }) {
  return (
    <div onClick={onClick} style={{
      background:"var(--card)", border:"1px solid var(--border)",
      borderRadius:16, padding:18, ...style,
      cursor: onClick ? "pointer" : "default",
    }}>{children}</div>
  );
}

Object.assign(window, { ToneBadge, PinyinRow, TTSBtn, ProgressBar, Chip, Btn, EmptyState, SectionTitle, Card, TONE_COLORS });

</script>

<script type="text/babel">
// HomeScreen — dashboard with XP/level, chapters & streak

function HomeScreen({ stats, onStudyChapter, onReview, onAiAssist, onCloudSync, session, syncStatus, syncState }) {
  const hour = new Date().getHours();
  const greeting = hour < 12 ? "좋은 아침이에요" : hour < 18 ? "안녕하세요" : "좋은 저녁이에요";
  const chineseGreeting = hour < 12 ? "早上好" : hour < 18 ? "你好" : "晚上好";

  const chapters = getStudyChapters(stats);
  const allWords = getAllWords(stats);
  const totalWords = allWords.length;
  const learned = stats.totalLearned || 0;
  const reviewWords = getDueReviewWords(stats);
  const reviewCount = reviewWords.length;
  const xp = stats.totalXP || 0;
  const level = Math.floor(xp / 100) + 1;
  const xpInLevel = xp % 100;
  const levelNames = ["","입문","초급","초중급","중급","중상급","상급","고급","전문가","달인","마스터"];
  const levelName = levelNames[Math.min(level, levelNames.length-1)] || "마스터";
  const todayCount = stats.todayCount || 0;
  const todayTarget = Math.max(8, Math.min(20, reviewCount + 8));
  const todayLeft = Math.max(0, todayTarget - todayCount);
  const levels = [...new Set(chapters.map(ch => ch.level))].sort((a,b)=>a-b);

  const today = new Date();
  const days = ["일","월","화","수","목","금","토"];
  const studiedDays = stats.studyDays || [];
  const last7 = Array.from({length:7}, (_,i) => {
    const d = new Date(today); d.setDate(d.getDate()-6+i);
    const iso = d.toISOString().slice(0,10);
    return { label:days[d.getDay()], done:studiedDays.includes(iso) || studiedDays.includes(d.toDateString()), today:d.toDateString()===today.toDateString() };
  });

  return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      {/* Header */}
      <div style={{marginBottom:22}}>
        <div style={{fontSize:13,color:"var(--sub)",marginBottom:4}}>{greeting} 👋</div>
        <div style={{fontFamily:"var(--font-zh)",fontSize:30,fontWeight:700,color:"var(--accent)",lineHeight:1,marginBottom:6}}>{chineseGreeting}</div>
        <div style={{fontSize:14,color:"var(--sub)"}}>오늘도 조금씩, 꾸준하게</div>
      </div>

      <Card onClick={onCloudSync} style={{marginBottom:14,display:"flex",alignItems:"center",gap:13,border:"1.5px solid var(--accent)22",padding:"14px 16px"}}>
        <span style={{fontSize:22}}>
          {session ? (syncState==="syncing" ? "⏳" : syncState==="error" ? "⚠️" : syncState==="dirty" ? "📝" : "☁️") : "📱"}
        </span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>
            {session ? (session.user?.email || "클라우드 연결됨") : "기기 연동 설정"}
          </div>
          <div style={{fontSize:12,color:"var(--sub)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {syncStatus || "동기화 상태 확인"}
          </div>
        </div>
        <div style={{
          fontSize:12,fontWeight:800,padding:"6px 9px",borderRadius:9,whiteSpace:"nowrap",
          background:syncState==="error"?"var(--coral-dim)":syncState==="syncing"?"var(--gold-dim)":syncState==="dirty"?"var(--card2)":"var(--accent-dim)",
          color:syncState==="error"?"var(--coral)":syncState==="syncing"?"var(--gold)":syncState==="dirty"?"var(--sub)":"var(--accent)"
        }}>
          {syncState==="error"?"확인 필요":syncState==="syncing"?"저장 중":syncState==="dirty"?"저장 대기":session?"저장됨":"미연결"}
        </div>
      </Card>

      {/* Today's work */}
      <Card style={{marginBottom:14,border:"1.5px solid var(--accent)33"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:14,alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:800,color:"var(--sub)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:4}}>오늘 할 일</div>
            <div style={{fontSize:20,fontWeight:800,color:"var(--text)",lineHeight:1.25}}>
              {reviewCount > 0 ? `복습 ${reviewCount}개 먼저` : todayLeft > 0 ? `새 단어 ${todayLeft}개 더` : "오늘 목표 완료"}
            </div>
            <div style={{fontSize:12,color:"var(--sub)",marginTop:5}}>
              오늘 {todayCount}/{todayTarget}개 진행 · 누적 {learned}개 학습
            </div>
          </div>
          <Btn variant={reviewCount > 0 ? "danger" : "primary"} onClick={reviewCount > 0 ? onReview : () => onStudyChapter(chapters[0])}
            style={{padding:"11px 16px",fontSize:13,whiteSpace:"nowrap"}}>
            {reviewCount > 0 ? "복습 시작" : "학습 시작"}
          </Btn>
        </div>
        <ProgressBar value={todayCount} max={todayTarget} color={reviewCount > 0 ? "var(--coral)" : "var(--accent)"}/>
        {reviewWords.length > 0 && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:12}}>
            {reviewWords.slice(0,3).map(w => (
              <span key={wordKey(w)} style={{
                fontSize:12,padding:"5px 9px",borderRadius:8,
                background:"var(--coral-dim)",color:"var(--coral)",fontWeight:700,
              }}>{w.char} · {w.meaning}</span>
            ))}
          </div>
        )}
      </Card>

      {/* Level + XP */}
      <Card style={{marginBottom:14,background:"linear-gradient(135deg,var(--accent-dim),var(--card))",border:"1.5px solid var(--accent)33"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:3}}>레벨</div>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontSize:30,fontWeight:800,color:"var(--accent)",lineHeight:1}}>Lv.{level}</span>
              <span style={{fontSize:13,color:"var(--sub)",fontWeight:600}}>{levelName}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:3}}>총 XP</div>
            <div style={{fontSize:26,fontWeight:800,color:"var(--gold)",lineHeight:1}}>{xp}<span style={{fontSize:13,fontWeight:500}}> xp</span></div>
          </div>
        </div>
        <ProgressBar value={xpInLevel} max={100} color="var(--accent)"/>
        <div style={{fontSize:11,color:"var(--sub)",marginTop:5,textAlign:"right"}}>다음 레벨까지 {100-xpInLevel} XP</div>
      </Card>

      {/* Streak + Review */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <Card style={{display:"flex",flexDirection:"column",gap:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:24}}>🔥</span>
            <span style={{fontSize:30,fontWeight:800,color:"var(--gold)",lineHeight:1}}>{stats.streak||0}</span>
          </div>
          <div style={{fontSize:11,color:"var(--sub)",fontWeight:500}}>일 연속 학습</div>
        </Card>
        <Card style={{display:"flex",flexDirection:"column",gap:4,cursor:reviewCount>0?"pointer":"default",
          border:reviewCount>0?"1.5px solid var(--coral)44":"1px solid var(--border)"}}
          onClick={reviewCount>0?onReview:undefined}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:24}}>🔄</span>
            <span style={{fontSize:30,fontWeight:800,color:reviewCount>0?"var(--coral)":"var(--sub)",lineHeight:1}}>{reviewCount}</span>
          </div>
          <div style={{fontSize:11,color:"var(--sub)",fontWeight:500}}>SRS 복습 대기</div>
        </Card>
      </div>

      {/* Weekly dots */}
      <Card style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:12}}>이번 주</div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {last7.map((d,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div style={{fontSize:10,color:"var(--sub2)"}}>{d.label}</div>
              <div style={{
                width:28,height:28,borderRadius:8,
                background:d.done?"var(--accent)":"var(--card2)",
                border:d.today?"2.5px solid var(--accent)":"2px solid transparent",
                display:"grid",placeItems:"center",
                fontSize:11,color:d.done?"#fff":"transparent",fontWeight:700,
              }}>{d.done?"✓":""}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Total progress */}
      <Card style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:600}}>전체 진도</span>
          <span style={{fontSize:13,color:"var(--sub)"}}>{learned} / {totalWords}단어</span>
        </div>
        <ProgressBar value={learned} max={totalWords}/>
      </Card>

      <Card onClick={onAiAssist} style={{marginBottom:18,display:"flex",alignItems:"center",gap:13,border:"1.5px solid var(--gold)44",background:"var(--gold-dim)"}}>
        <span style={{fontSize:24}}>🤖</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:800,color:"var(--text)"}}>AI 도움받기</div>
          <div style={{fontSize:12,color:"var(--sub)",marginTop:2}}>API 비용 없이 프롬프트를 복사해 Gemini 또는 ChatGPT 웹에서 이어가요</div>
        </div>
        <span style={{fontSize:18,color:"var(--gold)"}}>›</span>
      </Card>

      {/* Chapters */}
      <SectionTitle sub={`${chapters.length}개 챕터 · ${totalWords}개 단어`}>학습 챕터</SectionTitle>

      {levels.map(level=>(
        <div key={level} style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>
            {level === 0 ? "내 단어" : `HSK ${level}`}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {chapters.filter(c=>c.level===level).map(ch=>{
              const done = (stats.chapterProgress||{})[ch.id]||0;
              const total = ch.words.length;
              const isComplete = done >= total;
              return (
                <div key={ch.id} onClick={()=>onStudyChapter(ch)}
                  style={{display:"flex",alignItems:"center",gap:14,
                    background:"var(--card)",border:"1px solid var(--border)",
                    borderRadius:14,padding:"13px 16px",cursor:"pointer",transition:"all .15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--accent)55";e.currentTarget.style.background="var(--card2)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--card)"}}>
                  <div style={{fontSize:24,width:34,textAlign:"center",flexShrink:0}}>{ch.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{ch.title}</span>
                      <span style={{fontSize:11,color:"var(--sub2)",fontFamily:"var(--font-zh)"}}>{ch.titleZh}</span>
                    </div>
                    <ProgressBar value={done} max={total} height={4}/>
                    <div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>{done}/{total} {isComplete?"· 완료 ✓":""}</div>
                  </div>
                  <div style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:99,flexShrink:0,
                    background:isComplete?"var(--accent-dim)":"var(--card2)",
                    color:isComplete?"var(--accent)":"var(--sub)"}}>{isComplete?"완료":"학습"}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

Object.assign(window, { HomeScreen });

</script>

<script type="text/babel">
// StudyScreen — 3 modes: Flashcard / Listening / Fill-in-blank + XP/combo feedback

function StudyScreen({ chapter, stats, onResult, onBack }) {
  const chapters = getStudyChapters(stats);
  const allWords = getAllWords(stats);
  const [mode, setMode] = React.useState("card"); // card | listen | fill
  const [selectedChapter, setSelectedChapter] = React.useState(chapter || chapters[0]);
  const [queue, setQueue] = React.useState([]);
  const [idx, setIdx] = React.useState(0);
  const [sessionDone, setSessionDone] = React.useState(false);
  const [correct, setCorrect] = React.useState(0);
  const [combo, setCombo] = React.useState(0);
  const [xpPop, setXpPop] = React.useState(null); // {xp, key}
  const [flipped, setFlipped] = React.useState(false);
  const [answered, setAnswered] = React.useState(false);
  const [showStroke, setShowStroke] = React.useState(false);
  const [choices, setChoices] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const hwRef = React.useRef(null);
  const writerRef = React.useRef(null);

  React.useEffect(() => {
    if (chapter) setSelectedChapter(chapter);
  }, [chapter?.id]);

  // Build queue when chapter or mode changes
  React.useEffect(() => {
    const words = [...selectedChapter.words].sort(() => Math.random() - .5);
    setQueue(words); setIdx(0); setFlipped(false); setAnswered(false);
    setSessionDone(false); setCorrect(0); setCombo(0); setShowStroke(false);
    setSelected(null);
  }, [selectedChapter, mode]);

  // Build choices for quiz modes
  React.useEffect(() => {
    if (!queue[idx]) return;
    const w = queue[idx];
    const pool = allWords.filter(x => x.char !== w.char && x.level === selectedChapter.level);
    const shuffled = [...pool].sort(() => Math.random() - .5).slice(0, 3);
    const opts = [...shuffled.map(x => ({ char: x.char, meaning: x.meaning, correct: false })),
      { char: w.char, meaning: w.meaning, correct: true }].sort(() => Math.random() - .5);
    setChoices(opts);
    setSelected(null); setAnswered(false); setFlipped(false);
    if (mode === "listen") setTimeout(() => speak(w.char), 300);
  }, [idx, queue, mode]);

  // Stroke order
  React.useEffect(() => {
    if (flipped && showStroke && hwRef.current && queue[idx]) {
      const char = queue[idx].char[0];
      hwRef.current.innerHTML = '';
      if (writerRef.current) { try { writerRef.current.cancelAnimation(); } catch{} }
      try {
        writerRef.current = HanziWriter.create(hwRef.current, char, {
          width:130, height:130, padding:8,
          strokeColor:'#5B7EE8', radicalColor:'#E09040',
          outlineColor:'#D8DFF2', showOutline:true,
          strokeAnimationSpeed:1.2, delayBetweenStrokes:60,
        });
        writerRef.current.animateCharacter();
      } catch { hwRef.current.innerHTML = '<div style="color:var(--sub);font-size:12px;padding:16px;text-align:center">데이터 없음</div>'; }
    }
  }, [flipped, showStroke, idx, queue]);

  const word = queue[idx];
  const total = queue.length;

  const handleAnswer = (ok) => {
    const earned = ok ? (combo >= 2 ? 30 : combo >= 1 ? 20 : 10) : 0;
    const newCombo = ok ? combo + 1 : 0;
    setCombo(newCombo);
    if (ok && earned) setXpPop({ xp: earned, combo: newCombo, key: Date.now() });
    onResult(ok, word, selectedChapter.id, earned);
    setAnswered(true);
    if (ok) setCorrect(c => c+1);
  };

  const next = () => {
    if (idx+1 >= total) { setSessionDone(true); return; }
    setIdx(i => i+1); setFlipped(false); setAnswered(false);
    setShowStroke(false); setSelected(null);
  };

  if (sessionDone) return (
    <div style={{animation:"fadeUp .3s ease",textAlign:"center",padding:"48px 0"}}>
      <div style={{fontSize:52,marginBottom:12}}>{correct===total?"🏆":correct>=total*.7?"🎉":"💪"}</div>
      <div style={{fontFamily:"var(--font-zh)",fontSize:26,color:"var(--accent)",marginBottom:4}}>完成！</div>
      <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:4}}>세션 완료</div>
      <div style={{fontSize:14,color:"var(--sub)",marginBottom:8}}>
        {total}개 중 <span style={{color:"var(--accent)",fontWeight:700}}>{correct}개</span> 정답
      </div>
      <div style={{fontSize:13,color:"var(--gold)",fontWeight:600,marginBottom:28}}>
        +{correct*10 + (correct > 2 ? 20 : 0)} XP 획득!
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        <Btn variant="ghost" onClick={()=>{setIdx(0);setFlipped(false);setAnswered(false);setSessionDone(false);setCorrect(0);setCombo(0);}}>
          다시 하기
        </Btn>
        <Btn variant="primary" onClick={onBack}>홈으로</Btn>
      </div>
    </div>
  );

  if (!word) return null;

  return (
    <div style={{animation:"fadeUp .3s ease both",position:"relative"}}>
      {/* XP Pop animation */}
      {xpPop && <XpPopup key={xpPop.key} xp={xpPop.xp} combo={xpPop.combo} onDone={()=>setXpPop(null)}/>}

      {/* Chapter selector */}
      <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {chapters.map(ch=>(
          <Chip key={ch.id} label={`${ch.emoji} ${ch.title}`}
            active={selectedChapter.id===ch.id} onClick={()=>setSelectedChapter(ch)}/>
        ))}
      </div>

      {/* Mode tabs */}
      <div style={{display:"flex",gap:6,marginBottom:18,background:"var(--card2)",padding:4,borderRadius:12}}>
        {[["card","🃏 플래시카드"],["listen","🎧 듣기 퀴즈"],["fill","✏️ 빈칸 채우기"]].map(([m,l])=>(
          <button key={m} onClick={()=>setMode(m)} style={{
            flex:1,padding:"8px 4px",borderRadius:9,fontSize:12,fontWeight:600,
            background:mode===m?"var(--card)":"transparent",
            color:mode===m?"var(--accent)":"var(--sub)",
            border:"none",cursor:"pointer",fontFamily:"var(--font-ui)",
            boxShadow:mode===m?"0 1px 6px rgba(0,0,0,.06)":"none",
            transition:"all .15s",
          }}>{l}</button>
        ))}
      </div>

      {/* Progress row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:12,color:"var(--sub)"}}>{selectedChapter.title} · {idx+1}/{total}</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {combo >= 2 && <span style={{fontSize:12,fontWeight:700,color:"var(--gold)"}}>🔥 {combo}연속!</span>}
          <span style={{fontSize:12,fontWeight:700,color:"var(--accent)"}}>✓ {correct}</span>
        </div>
      </div>
      <div style={{height:5,marginBottom:18}}><ProgressBar value={idx} max={total}/></div>

      {/* ── CARD MODE ── */}
      {mode==="card" && (
        <>
          <div style={{perspective:1200,width:"100%",maxWidth:400,margin:"0 auto",height:250,cursor:answered?"default":"pointer"}}
            onClick={()=>!answered&&setFlipped(f=>!f)}>
            <div style={{
              position:"relative",width:"100%",height:"100%",
              transformStyle:"preserve-3d",transition:"transform .5s cubic-bezier(.4,0,.2,1)",
              transform:flipped?"rotateY(180deg)":"rotateY(0)",
            }}>
              <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",
                background:"var(--card)",border:"1px solid var(--border)",borderRadius:22,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,
                boxShadow:"0 6px 24px rgba(91,126,232,.13)"}}>
                <div style={{position:"absolute",top:12,right:14,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:"var(--card2)",color:"var(--sub)"}}>HSK {selectedChapter.level}</div>
                <div style={{fontFamily:"var(--font-zh)",fontSize:80,color:"var(--text)",lineHeight:1}}>{word.char}</div>
                <PinyinRow tones={word.tones}/>
                <div style={{position:"absolute",bottom:12,fontSize:11,color:"var(--sub2)"}}>탭하여 뒤집기</div>
              </div>
              <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",
                transform:"rotateY(180deg)",
                background:"var(--surface)",border:"1px solid var(--border)",borderRadius:22,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:20,
                boxShadow:"0 6px 24px rgba(91,126,232,.11)",overflowY:"auto"}}>
                <div style={{position:"absolute",top:12,right:14,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:"var(--card2)",color:"var(--sub)"}}>HSK {selectedChapter.level}</div>
                <div style={{fontFamily:"var(--font-zh)",fontSize:44,color:"var(--text)",lineHeight:1}}>{word.char}</div>
                <div style={{fontSize:20,color:"var(--accent)",fontWeight:600}}>{word.pinyin}</div>
                <PinyinRow tones={word.tones}/>
                <div style={{fontSize:16,color:"var(--text)",fontWeight:500}}>{word.meaning}</div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}>
                  <TTSBtn text={word.char} size="lg"/>
                  <button onClick={e=>{e.stopPropagation();setShowStroke(s=>!s);}} style={{
                    padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:600,
                    background:showStroke?"var(--accent-dim)":"var(--card2)",
                    border:`1px solid ${showStroke?"var(--accent)44":"var(--border)"}`,
                    color:showStroke?"var(--accent)":"var(--sub)",
                    cursor:"pointer",fontFamily:"var(--font-ui)",
                  }}>획순 {showStroke?"▲":"▼"}</button>
                </div>
              </div>
            </div>
          </div>
          {flipped&&showStroke&&(
            <div style={{animation:"fadeUp .25s ease",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:14,marginTop:10,maxWidth:400,margin:"10px auto 0",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <div style={{fontSize:11,color:"var(--sub)",fontWeight:600,letterSpacing:".05em"}}>획순</div>
              <div ref={hwRef} style={{width:130,height:130}}/>
            </div>
          )}
          {flipped&&(
            <div style={{animation:"fadeUp .3s ease",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:14,marginTop:10,maxWidth:400,margin:"10px auto 0"}}>
              <div style={{fontSize:11,color:"var(--sub)",fontWeight:600,marginBottom:7}}>예문</div>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"var(--font-zh)",fontSize:15,color:"var(--text)",lineHeight:1.5,marginBottom:2}}>{word.example}</div>
                  <div style={{fontSize:12,color:"var(--accent)",marginBottom:2}}>{word.exPinyin}</div>
                  <div style={{fontSize:12,color:"var(--sub)"}}>{word.exMeaning}</div>
                </div>
                <TTSBtn text={word.example}/>
              </div>
            </div>
          )}
          {flipped&&!answered&&(
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:18,maxWidth:400,margin:"18px auto 0"}}>
              <button onClick={()=>handleAnswer(false)} style={{flex:1,padding:"13px 0",borderRadius:13,fontSize:15,fontWeight:700,background:"var(--coral-dim)",color:"var(--coral)",border:"1.5px solid var(--coral)33",cursor:"pointer",fontFamily:"var(--font-ui)"}}>✕ 몰랐어</button>
              <button onClick={()=>handleAnswer(true)} style={{flex:1,padding:"13px 0",borderRadius:13,fontSize:15,fontWeight:700,background:"var(--accent-dim)",color:"var(--accent)",border:"1.5px solid var(--accent)44",cursor:"pointer",fontFamily:"var(--font-ui)"}}>○ 알았어</button>
            </div>
          )}
          {flipped&&answered&&<div style={{textAlign:"center",marginTop:18,maxWidth:400,margin:"18px auto 0"}}><Btn variant="primary" onClick={next} style={{width:"100%"}}>{idx+1<total?"다음 카드 →":"결과 보기"}</Btn></div>}
          {!flipped&&<div style={{textAlign:"center",marginTop:16}}><Btn variant="ghost" onClick={()=>setFlipped(true)}>뒤집기</Btn></div>}
        </>
      )}

      {/* ── LISTEN MODE ── */}
      {mode==="listen" && (
        <div style={{animation:"fadeUp .25s ease"}}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:20,padding:"28px 20px",marginBottom:16,textAlign:"center",boxShadow:"0 6px 24px rgba(91,126,232,.10)"}}>
            <div style={{fontSize:13,color:"var(--sub)",fontWeight:600,marginBottom:18}}>음성을 듣고 맞는 뜻을 고르세요</div>
            <button onClick={()=>speak(word.char)} style={{
              width:72,height:72,borderRadius:"50%",border:"none",cursor:"pointer",
              background:"var(--accent-dim)",color:"var(--accent)",fontSize:30,
              display:"grid",placeItems:"center",margin:"0 auto 12px",
              transition:"all .15s",fontFamily:"var(--font-ui)",
            }} onMouseEnter={e=>e.currentTarget.style.background="var(--accent)33"}
               onMouseLeave={e=>e.currentTarget.style.background="var(--accent-dim)"}>▶</button>
            <div style={{fontSize:12,color:"var(--sub2)"}}>다시 듣기</div>
            {answered&&<div style={{fontFamily:"var(--font-zh)",fontSize:36,color:"var(--text)",marginTop:14,fontWeight:700}}>{word.char}<span style={{fontSize:16,color:"var(--accent)",marginLeft:8}}>{word.pinyin}</span></div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {choices.map((c,i)=>{
              const state = !answered?"idle":c.correct?"correct":selected===i?"wrong":"idle";
              return(
                <button key={i} onClick={()=>{if(answered)return;setSelected(i);handleAnswer(c.correct);}} style={{
                  padding:"16px 12px",borderRadius:14,fontSize:14,fontWeight:600,cursor:answered?"default":"pointer",
                  background:state==="correct"?"var(--accent-dim)":state==="wrong"?"var(--coral-dim)":"var(--card)",
                  border:`2px solid ${state==="correct"?"var(--accent)":state==="wrong"?"var(--coral)":"var(--border)"}`,
                  color:state==="correct"?"var(--accent)":state==="wrong"?"var(--coral)":"var(--text)",
                  fontFamily:"var(--font-ui)",transition:"all .15s",textAlign:"center",
                }}>{c.meaning}</button>
              );
            })}
          </div>
          {answered&&<div style={{textAlign:"center",marginTop:18}}><Btn variant="primary" onClick={next} style={{width:"100%",maxWidth:400}}>{idx+1<total?"다음 →":"결과 보기"}</Btn></div>}
        </div>
      )}

      {/* ── FILL MODE ── */}
      {mode==="fill" && (
        <div style={{animation:"fadeUp .25s ease"}}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:20,padding:"22px 20px",marginBottom:16,boxShadow:"0 6px 24px rgba(91,126,232,.10)"}}>
            <div style={{fontSize:13,color:"var(--sub)",fontWeight:600,marginBottom:14}}>빈칸에 알맞은 단어를 고르세요</div>
            <div style={{fontFamily:"var(--font-zh)",fontSize:20,color:"var(--text)",lineHeight:1.8,letterSpacing:".05em"}}>
              {(() => {
                const parts = word.example.split(word.char);
                if(parts.length < 2) return <span style={{fontFamily:"var(--font-zh)",fontSize:20}}>{word.example}</span>;
                return parts.map((p,i)=>(
                  <React.Fragment key={i}>
                    {p}
                    {i<parts.length-1&&<span style={{
                      display:"inline-block",minWidth:60,borderBottom:"2.5px solid var(--accent)",
                      verticalAlign:"bottom",textAlign:"center",
                      color:"var(--accent)",fontWeight:700,fontSize:18,
                      paddingBottom:2,marginLeft:2,marginRight:2,
                    }}>{answered?word.char:"＿＿"}</span>}
                  </React.Fragment>
                ));
              })()}
            </div>
            <div style={{fontSize:12,color:"var(--sub)",marginTop:10}}>{word.exMeaning}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {choices.map((c,i)=>{
              const state = !answered?"idle":c.correct?"correct":selected===i?"wrong":"idle";
              return(
                <button key={i} onClick={()=>{if(answered)return;setSelected(i);handleAnswer(c.correct);}} style={{
                  padding:"16px 12px",borderRadius:14,cursor:answered?"default":"pointer",
                  background:state==="correct"?"var(--accent-dim)":state==="wrong"?"var(--coral-dim)":"var(--card)",
                  border:`2px solid ${state==="correct"?"var(--accent)":state==="wrong"?"var(--coral)":"var(--border)"}`,
                  color:state==="correct"?"var(--accent)":state==="wrong"?"var(--coral)":"var(--text)",
                  fontFamily:"var(--font-zh)",fontSize:22,fontWeight:700,
                  transition:"all .15s",textAlign:"center",
                }}>{c.char}</button>
              );
            })}
          </div>
          {answered&&(
            <div style={{marginTop:14}}>
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"10px 14px",marginBottom:12}}>
                <div style={{fontSize:12,color:"var(--accent)",marginBottom:2}}>{word.pinyin}</div>
                <div style={{fontSize:13,color:"var(--sub)"}}>{word.exPinyin}</div>
              </div>
              <Btn variant="primary" onClick={next} style={{width:"100%"}}>{idx+1<total?"다음 →":"결과 보기"}</Btn>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function XpPopup({ xp, combo, onDone }) {
  React.useEffect(() => { const t = setTimeout(onDone, 1200); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{
      position:"fixed",top:"30%",left:"50%",transform:"translateX(-50%)",
      pointerEvents:"none",zIndex:300,
      animation:"xpFloat 1.2s ease forwards",
      textAlign:"center",
    }}>
      <div style={{fontSize:22,fontWeight:800,color:"var(--gold)",textShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
        +{xp} XP {combo>=3?"🔥🔥":""}
      </div>
      {combo>=2&&<div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginTop:2}}>{combo}연속!</div>}
      <style>{`@keyframes xpFloat{0%{opacity:0;transform:translateX(-50%) translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-50px)}}`}</style>
    </div>
  );
}

Object.assign(window, { StudyScreen, XpPopup });

</script>

<script type="text/babel">
// VocabScreen — browse all words by chapter

function VocabScreen({ stats, onStudyChapter, onToggleWordFavorite, onAddUserWord }) {
  const [query, setQuery] = React.useState("");
  const [level, setLevel] = React.useState("all");
  const [tag, setTag] = React.useState("all");
  const [difficulty, setDifficulty] = React.useState("all");
  const [onlyFav, setOnlyFav] = React.useState(false);
  const [showAdd, setShowAdd] = React.useState(false);
  const [expanded, setExpanded] = React.useState({});

  const toggle = (id) => setExpanded(e => ({...e, [id]: !e[id]}));
  const chapters = getStudyChapters(stats);
  const allWords = getAllWords(stats);
  const favWords = (stats.favorites && stats.favorites.words) || {};
  const tags = [...new Set(allWords.flatMap(w => w.tags || []))].sort((a,b)=>a.localeCompare(b,"ko"));

  const filtered = chapters
    .filter(ch => level === "all" || ch.level === Number(level))
    .map(ch => ({
      ...ch,
      words: ch.words.filter(w => {
        const q = query.trim().toLowerCase();
        const haystack = [w.char, w.pinyin, w.meaning, w.example, w.exMeaning, ...(w.tags||[])].join(" ").toLowerCase();
        const queryOk = !q || haystack.includes(q);
        const tagOk = tag === "all" || (w.tags || []).includes(tag);
        const difficultyOk = difficulty === "all" || Number(w.difficulty || 1) === Number(difficulty);
        const favOk = !onlyFav || !!favWords[wordKey(w)];
        return queryOk && tagOk && difficultyOk && favOk;
      })
    }))
    .filter(ch => ch.words.length > 0);

  const totalShown = filtered.reduce((a,c) => a + c.words.length, 0);
  const startFilteredStudy = () => {
    const words = filtered.flatMap(ch => ch.words).slice(0, 40);
    if (!words.length) return;
    onStudyChapter({
      id:"search-session",
      level:0,
      title:"검색 결과",
      titleZh:"搜索结果",
      emoji:"🔎",
      words,
    });
  };

  return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"flex-start",marginBottom:4}}>
        <SectionTitle sub={`전체 ${allWords.length}개 · 지금 ${totalShown}개 표시`}>단어장</SectionTitle>
        <Btn variant="success" onClick={()=>setShowAdd(s=>!s)} style={{padding:"9px 13px",fontSize:13,whiteSpace:"nowrap"}}>
          + 단어
        </Btn>
      </div>

      {/* Search */}
      <div style={{position:"relative", marginBottom:14}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"var(--sub)",pointerEvents:"none"}}>🔍</span>
        <input value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="한자, 병음, 뜻으로 검색…"
          style={{
            width:"100%", padding:"10px 14px 10px 38px",
            background:"var(--card)", border:"1.5px solid var(--border)",
            borderRadius:12, fontSize:15, color:"var(--text)",
            outline:"none", fontFamily:"var(--font-ui)",
            transition:"border-color .15s",
          }}
          onFocus={e=>e.target.style.borderColor="var(--accent)"}
          onBlur={e=>e.target.style.borderColor="var(--border)"}
        />
      </div>

      {showAdd && <UserWordForm onAdd={(word)=>{onAddUserWord(word);setShowAdd(false);}} onCancel={()=>setShowAdd(false)}/>}

      {/* Filters */}
      <div style={{display:"flex", gap:8, marginBottom:10, overflowX:"auto", paddingBottom:2}}>
        <Chip label="전체" active={level==="all"} onClick={()=>setLevel("all")}/>
        {[...new Set(chapters.map(ch => ch.level))].sort((a,b)=>a-b).map(l => (
          <Chip key={l} label={l===0 ? "내 단어" : `HSK ${l}`} active={level===String(l)} onClick={()=>setLevel(String(l))}/>
        ))}
      </div>
      <div style={{display:"flex", gap:8, marginBottom:14, overflowX:"auto", paddingBottom:2}}>
        <Chip label="모든 태그" active={tag==="all"} onClick={()=>setTag("all")}/>
        {tags.slice(0,18).map(t => <Chip key={t} label={t} active={tag===t} onClick={()=>setTag(t)} color="var(--gold)"/>)}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        {[["all","난이도 전체"],["1","쉬움"],["2","보통"],["3","어려움"]].map(([k,l])=>(
          <Chip key={k} label={l} active={difficulty===k} onClick={()=>setDifficulty(k)} color="var(--coral)"/>
        ))}
        <Chip label="즐겨찾기" active={onlyFav} onClick={()=>setOnlyFav(v=>!v)} color="var(--gold)"/>
        <Btn variant="primary" onClick={startFilteredStudy} disabled={totalShown===0}
          style={{padding:"8px 14px",fontSize:13,marginLeft:"auto"}}>
          결과 학습
        </Btn>
      </div>

      {filtered.length === 0 && <EmptyState icon="🔎" title="검색 결과 없음" sub="다른 키워드로 검색해 보세요"/>}

      {filtered.map(ch => {
        const isOpen = expanded[ch.id] !== false; // default open
        const done = (stats.chapterProgress||{})[ch.id]||0;
        return (
          <div key={ch.id} style={{marginBottom:12}}>
            {/* Chapter header */}
            <div onClick={()=>toggle(ch.id)} style={{
              display:"flex", alignItems:"center", gap:12,
              background:"var(--card)", border:"1px solid var(--border)",
              borderRadius: isOpen ? "14px 14px 0 0" : 14,
              padding:"12px 16px", cursor:"pointer",
              transition:"border-radius .2s",
            }}>
              <span style={{fontSize:22}}>{ch.emoji}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex", alignItems:"center", gap:8}}>
                  <span style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{ch.title}</span>
                  <span style={{fontSize:11,color:"var(--sub2)",fontFamily:"var(--font-zh)"}}>{ch.titleZh}</span>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:"var(--card2)",color:"var(--sub)"}}>HSK {ch.level}</span>
                </div>
                <div style={{fontSize:11,color:"var(--sub)",marginTop:2}}>{done}/{ch.words.length} 학습완료</div>
              </div>
              <button onClick={(e)=>{e.stopPropagation();onStudyChapter(ch);}} style={{
                border:"none",borderRadius:9,padding:"7px 10px",fontSize:12,fontWeight:700,
                background:"var(--accent-dim)",color:"var(--accent)",cursor:"pointer",fontFamily:"var(--font-ui)",
              }}>학습</button>
              <span style={{color:"var(--sub)", fontSize:18, transition:"transform .2s", transform: isOpen?"rotate(180deg)":"rotate(0)"}}>›</span>
            </div>

            {/* Words list */}
            {isOpen && (
              <div style={{
                background:"var(--surface)", border:"1px solid var(--border)",
                borderTop:"none", borderRadius:"0 0 14px 14px", overflow:"hidden",
              }}>
                {ch.words.map((w,i) => (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", gap:14,
                    padding:"11px 16px",
                    borderBottom: i < ch.words.length-1 ? "1px solid var(--border)" : "none",
                  }}>
                    <div style={{
                      fontFamily:"var(--font-zh)", fontSize:28,
                      color:"var(--text)", minWidth:42, textAlign:"center",
                    }}>{w.char}</div>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:13, color:"var(--accent)", fontWeight:500, marginBottom:2}}>{w.pinyin}</div>
                      <div style={{fontSize:14, color:"var(--text)"}}>{w.meaning}</div>
                      <div style={{fontSize:11, color:"var(--sub)", marginTop:3, fontFamily:"var(--font-zh)"}}>{w.example}</div>
                    </div>
                    <div style={{display:"flex", flexDirection:"column", gap:4, alignItems:"center"}}>
                      <button onClick={()=>onToggleWordFavorite(w)} title="즐겨찾기" style={{
                        width:32,height:32,borderRadius:8,border:"1px solid var(--border)",cursor:"pointer",
                        background:favWords[wordKey(w)]?"var(--gold-dim)":"var(--card2)",
                        color:favWords[wordKey(w)]?"var(--gold)":"var(--sub)",fontSize:15,
                      }}>{favWords[wordKey(w)]?"★":"☆"}</button>
                      <TTSBtn text={w.char}/>
                      <div style={{display:"flex",gap:2}}>
                        {(w.tones||[]).map((t,ti) => <ToneBadge key={ti} tone={t} size={14}/>)}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function UserWordForm({ onAdd, onCancel }) {
  const [form, setForm] = React.useState({
    char:"", pinyin:"", meaning:"", tags:"사용자", example:"", exPinyin:"", exMeaning:"", difficulty:"1", frequency:"3"
  });
  const update = (key, value) => setForm(f => ({ ...f, [key]:value }));
  const submit = () => {
    if (!form.char.trim() || !form.meaning.trim()) {
      alert("중국어 단어와 뜻은 꼭 입력해 주세요.");
      return;
    }
    onAdd({
      ...form,
      id:`user-${Date.now()}`,
      char:form.char.trim(),
      pinyin:form.pinyin.trim(),
      meaning:form.meaning.trim(),
      tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean),
      difficulty:Number(form.difficulty || 1),
      frequency:Number(form.frequency || 3),
      createdAt:new Date().toISOString(),
    });
  };
  const inputStyle = {
    width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid var(--border)",
    background:"var(--card)",color:"var(--text)",fontSize:14,outline:"none",fontFamily:"var(--font-ui)",
  };
  return (
    <Card style={{marginBottom:16,border:"1.5px solid var(--accent)44"}}>
      <div style={{fontSize:14,fontWeight:800,marginBottom:12}}>내 단어 추가</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <input style={inputStyle} value={form.char} onChange={e=>update("char",e.target.value)} placeholder="중국어"/>
        <input style={inputStyle} value={form.pinyin} onChange={e=>update("pinyin",e.target.value)} placeholder="병음"/>
        <input style={inputStyle} value={form.meaning} onChange={e=>update("meaning",e.target.value)} placeholder="뜻"/>
        <input style={inputStyle} value={form.tags} onChange={e=>update("tags",e.target.value)} placeholder="태그, 쉼표 구분"/>
      </div>
      <textarea style={{...inputStyle,minHeight:74,resize:"vertical",marginBottom:10}} value={form.example}
        onChange={e=>update("example",e.target.value)} placeholder="예문"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <input style={inputStyle} value={form.exPinyin} onChange={e=>update("exPinyin",e.target.value)} placeholder="예문 병음"/>
        <input style={inputStyle} value={form.exMeaning} onChange={e=>update("exMeaning",e.target.value)} placeholder="예문 뜻"/>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
        <Btn variant="ghost" onClick={onCancel} style={{padding:"9px 14px",fontSize:13}}>취소</Btn>
        <Btn variant="primary" onClick={submit} style={{padding:"9px 14px",fontSize:13}}>추가</Btn>
      </div>
    </Card>
  );
}

Object.assign(window, { VocabScreen, UserWordForm });

</script>

<script type="text/babel">
// PhraseScreen — situational conversation cards

function PhraseScreen({ stats, onTogglePhraseFavorite }) {
  const [activeSet, setActiveSet] = React.useState(PHRASE_SETS[0]);
  const [studyMode, setStudyMode] = React.useState(false);
  const [idx, setIdx] = React.useState(0);
  const [showBack, setShowBack] = React.useState(false);
  const phraseFavs = (stats.favorites && stats.favorites.phrases) || {};

  const phrase = activeSet.phrases[idx];
  const total = activeSet.phrases.length;
  const phraseKey = (set=activeSet, p=phrase) => `${set.id}:${p.char}`;

  const next = () => {
    if (idx+1 >= total) { setStudyMode(false); setIdx(0); setShowBack(false); return; }
    setIdx(i=>i+1); setShowBack(false);
  };
  const prev = () => { if(idx>0){setIdx(i=>i-1);setShowBack(false);} };

  if (studyMode) return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>{setStudyMode(false);setIdx(0);setShowBack(false);}} style={{
          background:"var(--card2)",border:"1px solid var(--border)",
          borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:600,
          color:"var(--sub)",cursor:"pointer",fontFamily:"var(--font-ui)",
        }}>← 뒤로</button>
        <div style={{fontSize:15,fontWeight:700}}>{activeSet.emoji} {activeSet.title}</div>
        <div style={{marginLeft:"auto",fontSize:12,color:"var(--sub)"}}>{idx+1}/{total}</div>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
        <button onClick={()=>onTogglePhraseFavorite(activeSet, phrase)} style={{
          border:"1px solid var(--border)",borderRadius:10,padding:"8px 12px",fontSize:13,fontWeight:700,
          background:phraseFavs[phraseKey()]?"var(--gold-dim)":"var(--card)",color:phraseFavs[phraseKey()]?"var(--gold)":"var(--sub)",
          cursor:"pointer",fontFamily:"var(--font-ui)",
        }}>{phraseFavs[phraseKey()]?"★ 즐겨찾기됨":"☆ 표현 즐겨찾기"}</button>
      </div>
      <div style={{height:5,marginBottom:20}}><ProgressBar value={idx} max={total}/></div>

      {/* Phrase card */}
      <div style={{perspective:1200,width:"100%",maxWidth:420,margin:"0 auto",height:230,cursor:"pointer",marginBottom:16}}
        onClick={()=>setShowBack(b=>!b)}>
        <div style={{
          position:"relative",width:"100%",height:"100%",
          transformStyle:"preserve-3d",
          transition:"transform .45s cubic-bezier(.4,0,.2,1)",
          transform:showBack?"rotateY(180deg)":"rotateY(0)",
        }}>
          {/* Front */}
          <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",
            background:"var(--card)",border:"1px solid var(--border)",
            borderRadius:22,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",gap:12,padding:24,
            boxShadow:"0 6px 24px rgba(91,126,232,.11)"}}>
            <div style={{position:"absolute",top:12,left:14,fontSize:11,fontWeight:700,
              padding:"3px 10px",borderRadius:99,background:"var(--accent-dim)",color:"var(--accent)"}}>
              {activeSet.emoji} {activeSet.title}
            </div>

<script type="text/babel">
// ReviewScreen — wrong-answer queue

function ReviewScreen({ stats, onResult, onBack }) {
  const [queue, setQueue] = React.useState(() => {
    return getDueReviewWords(stats);
  });
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [answered, setAnswered] = React.useState(false);
  const [cleared, setCleared] = React.useState(0);
  const [okLast, setOkLast] = React.useState(false);

  if (queue.length === 0) return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      <SectionTitle sub="오늘 만기된 단어와 자주 틀린 단어를 다시 봐요">SRS 복습</SectionTitle>
      <EmptyState icon="🌿" title="복습할 카드가 없어요"
        sub={cleared > 0 ? `${cleared}개 단어를 완전히 익혔어요!` : "학습 중 '몰랐어'를 누르면 여기에 쌓여요"}/>
      <div style={{textAlign:"center", marginTop:24}}>
        <Btn variant="primary" onClick={onBack}>홈으로</Btn>
      </div>
    </div>
  );

  const word = queue[idx];
  const total = queue.length;
  const reviewInfo = (stats.reviewLedger || {})[wordKey(word)] || {};

  const handleAnswer = (ok) => {
    onResult(ok, word, word.chapterId, ok ? 12 : 0);
    if (ok) setCleared(c => c+1);
    setOkLast(ok);
    setAnswered(true);
  };

  const next = () => {
    if (okLast) {
      const nq = queue.filter((_,i) => i !== idx);
      if (nq.length === 0) { setQueue([]); return; }
      setQueue(nq);
      setIdx(i => Math.min(i, nq.length - 1));
    } else {
      setIdx(i => (i+1) % queue.length);
    }
    setFlipped(false); setAnswered(false);
  };

  return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <SectionTitle>SRS 복습</SectionTitle>
        <div style={{
          fontSize:13, fontWeight:700, padding:"4px 12px", borderRadius:99,
          background:"var(--coral-dim)", color:"var(--coral)", marginBottom:16,
        }}>{queue.length}개 남음</div>
      </div>

      <div style={{marginBottom:12}}>
        <ProgressBar value={cleared} max={cleared+queue.length} color="var(--coral)"/>
        <div style={{fontSize:11,color:"var(--sub)",marginTop:4,textAlign:"right"}}>{cleared}개 완료</div>
      </div>

      {/* Card */}
      <div style={{perspective:1200, width:"100%", maxWidth:400, margin:"0 auto", height:240, cursor:answered?"default":"pointer"}}
        onClick={()=>!answered&&setFlipped(f=>!f)}>
        <div style={{
          position:"relative", width:"100%", height:"100%",
          transformStyle:"preserve-3d",
          transition:"transform .5s cubic-bezier(.4,0,.2,1)",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0)",
        }}>
          <div style={{
            position:"absolute",inset:0,backfaceVisibility:"hidden",
            background:"var(--card)",border:"1px solid var(--border)",
            borderRadius:22,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",gap:10,
            boxShadow:"0 6px 24px rgba(91,126,232,.12)",
          }}>
            <div style={{
              position:"absolute",top:12,left:14,fontSize:11,fontWeight:700,
              padding:"3px 10px",borderRadius:99,
              background:"var(--coral-dim)",color:"var(--coral)",
            }}>복습 {idx+1}/{total}</div>
            {(reviewInfo.wrong || 0) > 0 && (
              <div style={{
                position:"absolute",top:12,right:14,fontSize:11,fontWeight:700,
                padding:"3px 10px",borderRadius:99,
                background:"var(--gold-dim)",color:"var(--gold)",
              }}>오답 {reviewInfo.wrong}회</div>
            )}
            <div style={{fontFamily:"var(--font-zh)",fontSize:72,color:"var(--text)",lineHeight:1}}>{word.char}</div>
            <PinyinRow tones={word.tones}/>
            <div style={{position:"absolute",bottom:12,fontSize:11,color:"var(--sub2)"}}>탭하여 뒤집기</div>
          </div>
          <div style={{
            position:"absolute",inset:0,backfaceVisibility:"hidden",
            transform:"rotateY(180deg)",
            background:"var(--surface)",border:"1px solid var(--border)",
            borderRadius:22,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",gap:8,padding:20,
            boxShadow:"0 6px 24px rgba(91,126,232,.10)",
          }}>
            <div style={{fontFamily:"var(--font-zh)",fontSize:42,color:"var(--text)",lineHeight:1}}>{word.char}</div>
            <div style={{fontSize:19,color:"var(--accent)",fontWeight:600}}>{word.pinyin}</div>
            <div style={{fontSize:15,color:"var(--text)",fontWeight:500}}>{word.meaning}</div>
            <TTSBtn text={word.char} size="lg"/>
          </div>
        </div>
      </div>

      {/* Example */}
      {flipped && (
        <div style={{
          animation:"fadeUp .25s ease",
          background:"var(--card)",border:"1px solid var(--border)",
          borderRadius:14,padding:14,marginTop:12,
          maxWidth:400,margin:"12px auto 0",
        }}>
          <div style={{fontSize:11,color:"var(--sub)",fontWeight:600,marginBottom:6}}>예문</div>
          <div style={{fontFamily:"var(--font-zh)",fontSize:15,color:"var(--text)",marginBottom:2,lineHeight:1.5}}>{word.example}</div>
          <div style={{fontSize:12,color:"var(--accent)",marginBottom:2}}>{word.exPinyin}</div>
          <div style={{fontSize:12,color:"var(--sub)"}}>{word.exMeaning}</div>
        </div>
      )}

      {flipped && !answered && (
        <div style={{animation:"fadeUp .2s ease",display:"flex",gap:12,justifyContent:"center",marginTop:18,maxWidth:400,margin:"18px auto 0"}}>
          <button onClick={()=>handleAnswer(false)} style={{
            flex:1,padding:"13px 0",borderRadius:13,fontSize:15,fontWeight:700,
            background:"var(--coral-dim)",color:"var(--coral)",
            border:"1.5px solid var(--coral)33",cursor:"pointer",fontFamily:"var(--font-ui)",
          }}>✕ 아직 몰라</button>
          <button onClick={()=>handleAnswer(true)} style={{
            flex:1,padding:"13px 0",borderRadius:13,fontSize:15,fontWeight:700,
            background:"var(--accent-dim)",color:"var(--accent)",
            border:"1.5px solid var(--accent)44",cursor:"pointer",fontFamily:"var(--font-ui)",
          }}>○ 이젠 알아!</button>
        </div>
      )}
      {flipped && answered && (
        <div style={{textAlign:"center",marginTop:18,maxWidth:400,margin:"18px auto 0"}}>
          {okLast
            ? <div style={{fontSize:13,color:"var(--accent)",fontWeight:600,marginBottom:12}}>✓ 복습 목록에서 제거돼요</div>
            : <div style={{fontSize:13,color:"var(--coral)",fontWeight:600,marginBottom:12}}>다음에 다시 나와요</div>
          }
          <Btn variant="primary" onClick={next} style={{width:"100%"}}>
            {queue.length <= 1 && okLast ? "완료!" : "다음 →"}
          </Btn>
        </div>
      )}
      {!flipped && (
        <div style={{textAlign:"center",marginTop:16}}>
          <Btn variant="ghost" onClick={()=>setFlipped(true)}>뒤집기</Btn>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { ReviewScreen });

</script>

<script type="text/babel">
// StatsScreen — with XP, level, combo record

function StatsScreen({ stats }) {
  const chapters = getStudyChapters(stats);
  const allWords = getAllWords(stats);
  const total = allWords.length;
  const learned = stats.totalLearned || 0;
  const pct = total > 0 ? Math.round(learned/total*100) : 0;
  const accuracy = stats.totalAnswered > 0 ? Math.round(stats.totalCorrect/stats.totalAnswered*100) : 0;
  const xp = stats.totalXP || 0;
  const level = Math.floor(xp/100)+1;
  const xpInLevel = xp % 100;
  const levelNames = ["","입문","초급","초중급","중급","중상급","상급","고급","전문가","달인","마스터"];
  const levelName = levelNames[Math.min(level,levelNames.length-1)] || "마스터";
  const circumference = 2*Math.PI*52;
  const dueReviews = getDueReviewWords(stats);
  const wrongHotlist = allWords
    .map(w => ({ word:w, info:(stats.reviewLedger || {})[wordKey(w)] || {} }))
    .filter(x => (x.info.wrong || 0) > 0)
    .sort((a,b) => (b.info.wrong || 0) - (a.info.wrong || 0))
    .slice(0,5);

  const today = new Date();
  const studiedDays = stats.studyDays || [];
  const last14 = Array.from({length:14},(_,i)=>{
    const d = new Date(today); d.setDate(d.getDate()-13+i);
    const iso = d.toISOString().slice(0,10);
    return { day:d.getDate(), done:studiedDays.includes(iso) || studiedDays.includes(d.toDateString()) };
  });

  return (
    <div style={{animation:"fadeUp .3s ease both"}}>
      <SectionTitle sub="나의 학습 기록">통계</SectionTitle>

      {/* XP / Level banner */}
      <Card style={{marginBottom:14,display:"flex",alignItems:"center",gap:18,
        background:"linear-gradient(135deg,var(--accent-dim),var(--card))",
        border:"1.5px solid var(--accent)33"}}>
        <div style={{position:"relative",width:80,height:80,flexShrink:0}}>
          <svg viewBox="0 0 80 80" style={{width:80,height:80,transform:"rotate(-90deg)"}}>
            <circle cx="40" cy="40" r="34" fill="none" stroke="var(--card2)" strokeWidth="7"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="var(--accent)" strokeWidth="7"
              strokeDasharray={2*Math.PI*34}
              strokeDashoffset={2*Math.PI*34*(1-xpInLevel/100)}
              strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:"var(--accent)",lineHeight:1}}>{level}</div>
            <div style={{fontSize:8,color:"var(--sub)"}}>LV</div>
          </div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:18,fontWeight:800,color:"var(--text)",marginBottom:2}}>
            Lv.{level} <span style={{fontSize:13,fontWeight:600,color:"var(--sub)"}}>{levelName}</span>
          </div>
          <div style={{fontSize:13,color:"var(--gold)",fontWeight:700,marginBottom:6}}>{xp} XP 총 획득</div>
          <ProgressBar value={xpInLevel} max={100}/>
          <div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>다음 레벨까지 {100-xpInLevel} XP</div>
        </div>
      </Card>

      {/* Circular word progress */}
      <Card style={{textAlign:"center",marginBottom:14,padding:"24px 20px"}}>
        <div style={{position:"relative",width:120,height:120,margin:"0 auto 14px"}}>
          <svg viewBox="0 0 120 120" style={{width:120,height:120,transform:"rotate(-90deg)"}}>
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--card2)" strokeWidth="10"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" strokeWidth="10"
              strokeDasharray={circumference}
              strokeDashoffset={circumference*(1-pct/100)}
              strokeLinecap="round" style={{transition:"stroke-dashoffset 1s ease"}}/>
          </svg>

// ChatScreen — free web handoff. No API keys, no direct AI network calls.

  { id:"quiz", label:"퀴즈", hint:"복습 문제", template:(text)=>`아래 중국어 표현으로 초급 학습자용 퀴즈 5문제를 만들어줘. 정답과 짧은 해설도 한국어로 붙여줘. 표현: ${text}` },
];

function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  return Promise.resolve();
}

function ChatScreen() {

            <div style={{fontSize:13,color:"var(--sub)",lineHeight:1.55}}>
              자동 로그인이나 자동 전송은 하지 않습니다. 아래 버튼은 프롬프트를 복사하고 외부 서비스를 새 탭으로 열어줍니다.

    url:supabaseConfig?.url || "",

    setCloudForm(f => ({ ...f, url:supabaseConfig?.url || "", anonKey:supabaseConfig?.anonKey || "" }));
  }, [supabaseConfig?.url, supabaseConfig?.anonKey]);
  React.useEffect(() => {
    if (!session) setShowConfig(true);
  }, [session]);
  const exportData = () => {
    const payload = StorageService.exportPayload(stats, tweaks);
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `chinese-study-backup-${todayKey()}.json`;
    document.body.appendChild(a);

    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    setStatus("백업 파일을 만들었어요.");
  };

      try {
        const payload = JSON.parse(reader.result);
        const studyState = payload.studyState || payload.stats || payload;
        const nextStats = { ...makeDefaultStats(), ...studyState };
        onImport(nextStats, payload.tweaks || null);
        setStatus("복원 완료. 이 기기에서 이어서 학습할 수 있어요.");

        setStatus("JSON 파일을 읽지 못했어요. 백업 파일인지 확인해 주세요.");
